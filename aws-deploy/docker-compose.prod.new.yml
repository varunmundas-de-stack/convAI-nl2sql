services:
  postgres:
    image: postgres:15
    container_name: nl2sql-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../cube/data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_analytics"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nl2sql-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  cube:
    image: cubejs/cube:latest
    container_name: nl2sql-cube
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../cube/model:/cube/conf/model
      - ../cube/cube.js:/cube/conf/cube.js
    environment:
      CUBEJS_DEV_MODE: "false"
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: sales_analytics
      CUBEJS_DB_USER: postgres
      CUBEJS_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-mysecretkey123}

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: nl2sql-backend:latest
    container_name: nl2sql-backend
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cube:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sales_analytics
      DB_USER: postgres
      DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sales_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CUBE_API_URL: http://cube:4000/cubejs-api/v1
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-mysecretkey123}
      REDIS_URL: redis://redis:6379
      APP_JWT_SECRET: ${APP_JWT_SECRET:-changeme-prod-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL_ID: ${ANTHROPIC_MODEL_ID:-claude-haiku-4-5-20251001}
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://${EC2_PUBLIC_IP}:8000
    image: nl2sql-frontend:latest
    container_name: nl2sql-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
